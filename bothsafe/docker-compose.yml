services:
  postgres:
    container_name: bothsafe-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bothsafe
      POSTGRES_PASSWORD: bothsafe
      POSTGRES_DB: bothsafe
    ports:
      - "5432:5432"
    volumes:
      - bothsafe_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bothsafe"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: bothsafe-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bothsafe_postgres:
