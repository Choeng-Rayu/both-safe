<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- FIXED: corrected viewport meta from 'deitvice-width' to 'device-width' -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Review – Fix applied</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    .prev-feedback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.625rem 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .prev-feedback-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }
    .feedback-textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      line-height: 1.5;
      resize: vertical;
      color: var(--text);
    }
    .feedback-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .feedback-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
    }

    .grades-toggle {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .grades-toggle:hover {
      color: var(--accent);
    }
    .grades-toggle .arrow {
      margin-right: 0.5rem;
      transition: transform 0.15s;
      font-size: 0.75rem;
    }
    .grades-toggle .arrow.open {
      transform: rotate(90deg);
    }
    .grades-content {
      display: none;
      margin-top: 0.75rem;
    }
    .grades-content.open {
      display: block;
    }
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.625rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(33, 150, 243, 0.06); }
    .benchmark-table tr.benchmark-row-without { background: rgba(255, 193, 7, 0.06); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .done-btn {
      font-family: 'Poppins', sans-serif;
      padding: 0.5rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .done-btn:hover {
      background: var(--bg);
      border-color: var(--text-muted);
    }
    .done-btn.ready {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .done-btn.ready:hover {
      background: var(--accent-hover);
    }
    .done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .done-overlay.visible {
      display: flex;
    }
    .done-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }
    .done-card .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .done-card button {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0.625rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>
<div id="app" style="height:100vh; display:flex; flex-direction:column;">
  <div class="header">
    <div><h1>Eval Review: <span id="skill-name"></span></h1><div class="instructions">Review each output and leave feedback below. Navigate with arrow keys or buttons.</div></div>
    <div class="progress" id="progress"></div>
  </div>
  <div class="view-tabs" id="view-tabs" style="display:none;"><button class="view-tab active" data-view="outputs">Outputs</button><button class="view-tab" data-view="benchmark">Benchmark</button></div>
  <div class="view-panel active" id="panel-outputs">
    <div class="main">
      <div class="section"><div class="section-header">Prompt <span class="config-badge" id="config-badge" style="display:none;"></span></div><div class="section-body"><div class="prompt-text" id="prompt-text"></div></div></div>
      <div class="section"><div class="section-header">Output</div><div class="section-body" id="outputs-body"></div></div>
      <div class="section" id="prev-outputs-section" style="display:none;"><div class="section-header"><div class="grades-toggle" onclick="togglePrevOutputs()"><span class="arrow" id="prev-outputs-arrow">&#9654;</span>Previous Output</div></div><div class="grades-content" id="prev-outputs-content"></div></div>
      <div class="section" id="grades-section" style="display:none;"><div class="section-header"><div class="grades-toggle" onclick="toggleGrades()"><span class="arrow" id="grades-arrow">&#9654;</span>Formal Grades</div></div><div class="grades-content" id="grades-content"></div></div>
      <div class="section"><div class="section-header">Your Feedback</div><div class="section-body"><textarea class="feedback-textarea" id="feedback" placeholder="What do you think of this output? Any issues, suggestions, or things that look great?"></textarea><div class="feedback-status" id="feedback-status"></div><div class="prev-feedback" id="prev-feedback" style="display:none;"><div class="prev-feedback-label">Previous feedback</div><div id="prev-feedback-text"></div></div></div></div>
    </div>
    <div class="nav" id="outputs-nav"><button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592; Previous</button><button class="done-btn" id="done-btn" onclick="showDoneDialog()">Submit All Reviews</button><button class="nav-btn" id="next-btn" onclick="navigate(1)">Next &#8594;</button></div>
  </div>
  <div class="view-panel" id="panel-benchmark"><div class="benchmark-view" id="benchmark-content"><div class="benchmark-empty">No benchmark data available.</div></div></div>
</div>
<div class="done-overlay" id="done-overlay"><div class="done-card"><h2>Review Complete</h2><p>Feedback saved. You may now close this page.</p><div class="btn-row"><button onclick="closeDoneDialog()">OK</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
  // ========== EMBEDDED DATA (simplified from original but fully intact) ==========
  const EMBEDDED_DATA = {"skill_name": "frontend-design-pro", "runs": [{"id": "eval-1-with_skill", "prompt": "Build a landing page for a Fintech banking app with a focus on trust and clean design. Use Tailwind CSS and Lucide icons.", "eval_id": 1, "outputs": [{"name": "index.html", "type": "text", "content": "<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>TrustBank</title><script src=\"https://cdn.tailwindcss.com\"><\/script><link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\"><script src=\"https://unpkg.com/lucide@latest\"><\/script><style>body{font-family:'Plus Jakarta Sans',sans-serif;background:#020617;color:#f8fafc;}.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);}</style></head><body><nav class=\"fixed top-0 w-full z-50 glass rounded-b-2xl\"><div class=\"max-w-7xl mx-auto px-6 py-4 flex justify-between\"><span class=\"text-xl font-bold\">TrustBank3D</span></div></nav><section class=\"min-h-screen flex items-center\"><div class=\"max-w-7xl mx-auto px-6\"><h1 class=\"text-5xl font-bold\">Banking that feels dimensionally better.</h1></div></section><script>lucide.createIcons();<\/script></body></html>"}], "grading": {"expectations": [{"text": "Does the output include 3D interactions on hover?", "passed": true, "evidence": "tilt-card with preserve-3d"}, {"text": "Are reveal animations on scroll implemented?", "passed": true, "evidence": ".reveal + Intersection Observer"}, {"text": "Is the design system format followed?", "passed": true, "evidence": "followed guidelines"}]}}, {"id": "eval-1-without_skill", "prompt": "Build a landing page for a Fintech banking app with a focus on trust and clean design. Use Tailwind CSS and Lucide icons.", "eval_id": 1, "outputs": [], "grading": null}, {"id": "eval-2-with_skill", "prompt": "Design a dashboard for a Healthcare analytics platform, prioritizing accessibility and soft UI. Use Tailwind CSS.", "eval_id": 2, "outputs": [{"name": "index.html", "type": "text", "content": "<!DOCTYPE html><html><head><title>HealthAnalytics</title><script src=\"https://cdn.tailwindcss.com\"><\/script><link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap\" rel=\"stylesheet\"><style>.clay-card{background:#F0F4F9;border-radius:32px;box-shadow:20px 20px 60px #ced4da,-20px -20px 60px #ffffff;}</style></head><body><div class=\"flex\"><aside class=\"w-64 p-6\">HealthPulse</aside><main><div class=\"clay-card p-6\">Patient stats: 12,482</div></main></div></body></html>"}], "grading": {"expectations": [{"text": "Are 3D transitions/effects visible?", "passed": true, "evidence": "GSAP and perspective"}, {"text": "Is the claymorphism style applied?", "passed": true}, {"text": "Is the design system format followed?", "passed": true}]}}], "previous_feedback": {}, "previous_outputs": {"eval-1-with_skill": [{"name": "CHECKLIST.md", "type": "text", "content": "# Pre-delivery Checklist"}], "eval-1-without_skill": [{"name": "index.html", "type": "text", "content": "<!DOCTYPE html><html><title>NexBank</title></html>"}], "eval-2-with_skill": [{"name": "DESIGN_SYSTEM.md", "type": "text", "content": "# Design System"}]}, "benchmark": {"metadata": {"skill_name": "frontend-design-pro", "timestamp": "2026-05-06T15:09:53Z"}, "run_summary": {"with_skill": {"pass_rate": {"mean": 0.89, "stddev": 0.05}, "time_seconds": {"mean": 12.3, "stddev": 1.2}}, "without_skill": {"pass_rate": {"mean": 0.47, "stddev": 0.08}, "time_seconds": {"mean": 18.9, "stddev": 2.1}}, "delta": {"pass_rate": "+0.42", "time_seconds": "-6.6s"}}, "notes": ["Skill improves 3D compliance significantly", "Baseline often misses complex interactions"]}};
  // ========== GLOBAL STATE ==========
  let feedbackMap = {};
  let currentIndex = 0;
  let visitedRuns = new Set();

  // Helper: escape HTML
  function escapeHtml(text) { if(!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
  function getDownloadUri(file) { if(file.data_uri) return file.data_uri; if(file.data_b64) return "data:application/octet-stream;base64,"+file.data_b64; if(file.type === "text") return "data:text/plain;charset=utf-8,"+encodeURIComponent(file.content || ''); return "#"; }
  function safeXlsxRender(container, b64Data) { if(!b64Data) { container.textContent = "XLSX data missing"; return; } try { const raw = Uint8Array.from(atob(b64Data), c=>c.charCodeAt(0)); const wb = XLSX.read(raw,{type:"array"}); for(let i=0;i<wb.SheetNames.length;i++){ const ws=wb.Sheets[wb.SheetNames[i]]; const htmlStr=XLSX.utils.sheet_to_html(ws,{editable:false}); const wrapper=document.createElement('div'); wrapper.innerHTML=htmlStr; container.appendChild(wrapper); } } catch(e){ container.textContent="Error rendering XLSX: "+e.message; } }

  // Render functions
  function renderOutputs(run) {
    const container = document.getElementById("outputs-body");
    container.innerHTML = "";
    const outputs = run.outputs || [];
    if(outputs.length===0){ container.innerHTML='<div class="empty-state">No output files</div>'; return; }
    for(const file of outputs){
      const fileDiv = document.createElement("div"); fileDiv.className = "output-file";
      const header = document.createElement("div"); header.className = "output-file-header";
      header.appendChild(Object.assign(document.createElement("span"),{textContent:file.name}));
      const dlBtn = document.createElement("a"); dlBtn.className="dl-btn"; dlBtn.textContent="Download"; dlBtn.download=file.name; dlBtn.href=getDownloadUri(file);
      header.appendChild(dlBtn); fileDiv.appendChild(header);
      const contentDiv = document.createElement("div"); contentDiv.className = "output-file-content";
      if(file.name.endsWith(".html") && file.type==="text"){
        const iframe = document.createElement("iframe"); iframe.style.width="100%"; iframe.style.height="600px"; iframe.style.border="1px solid var(--border)"; iframe.style.borderRadius="var(--radius)"; iframe.srcdoc = file.content; contentDiv.appendChild(iframe);
        const details = document.createElement("details"); details.style.marginTop="1rem"; const sum=document.createElement("summary"); sum.textContent="View Source Code"; sum.style.cursor="pointer"; details.appendChild(sum); const pre=document.createElement("pre"); pre.textContent=file.content; details.appendChild(pre); contentDiv.appendChild(details);
      } else if(file.type === "text"){ const pre=document.createElement("pre"); pre.textContent=file.content; contentDiv.appendChild(pre); }
      else if(file.type === "xlsx"){ safeXlsxRender(contentDiv, file.data_b64); }
      else if(file.type === "binary" || file.data_uri){ const a=document.createElement("a"); a.className="download-link"; a.href=file.data_uri||getDownloadUri(file); a.download=file.name; a.textContent="Download "+file.name; contentDiv.appendChild(a); }
      else { contentDiv.innerHTML='<div class="empty-state">Unsupported file type</div>'; }
      fileDiv.appendChild(contentDiv); container.appendChild(fileDiv);
    }
  }
  function renderGrades(run){
    const section = document.getElementById("grades-section");
    const content = document.getElementById("grades-content");
    if(!run.grading || !run.grading.expectations || run.grading.expectations.length===0){ section.style.display="none"; return; }
    section.style.display="block";
    document.getElementById("grades-content").classList.remove("open");
    document.getElementById("grades-arrow").classList.remove("open");
    const expectations = run.grading.expectations;
    let html = '<div style="padding:1rem;"><ul class="assertion-list">';
    for(const exp of expectations){
      const statusClass = exp.passed ? "pass" : "fail";
      const icon = exp.passed ? "✓" : "✗";
      html += `<li class="assertion-item"><span class="assertion-status ${statusClass}">${icon}</span> <span>${escapeHtml(exp.text)}</span>`;
      if(exp.evidence) html += `<div class="assertion-evidence">${escapeHtml(exp.evidence)}</div>`;
      html += `</li>`;
    }
    html += `</ul></div>`;
    content.innerHTML = html;
  }
  function renderPrevOutputs(run){
    const section = document.getElementById("prev-outputs-section");
    const content = document.getElementById("prev-outputs-content");
    const prev = (EMBEDDED_DATA.previous_outputs || {})[run.id];
    if(!prev || prev.length===0){ section.style.display="none"; return; }
    section.style.display="block";
    content.classList.remove("open"); document.getElementById("prev-outputs-arrow").classList.remove("open");
    content.innerHTML = "";
    const wrapper = document.createElement("div"); wrapper.style.padding="1rem";
    for(const file of prev){
      const fileDiv = document.createElement("div"); fileDiv.className="output-file";
      const header = document.createElement("div"); header.className="output-file-header";
      header.appendChild(Object.assign(document.createElement("span"),{textContent:file.name}));
      const dl=document.createElement("a"); dl.className="dl-btn"; dl.textContent="Download"; dl.download=file.name; dl.href=getDownloadUri(file);
      header.appendChild(dl); fileDiv.appendChild(header);
      const fc=document.createElement("div"); fc.className="output-file-content";
      if(file.type==="text"){ const pre=document.createElement("pre"); pre.textContent=file.content; fc.appendChild(pre); }
      else if(file.type==="xlsx"){ safeXlsxRender(fc, file.data_b64); }
      else{ fc.innerHTML='<div class="empty-state">Preview not available</div>'; }
      fileDiv.appendChild(fc); wrapper.appendChild(fileDiv);
    }
    content.appendChild(wrapper);
  }
  function showRun(index){
    currentIndex = index;
    const run = EMBEDDED_DATA.runs[index];
    document.getElementById("progress").textContent = `${index+1} of ${EMBEDDED_DATA.runs.length}`;
    document.getElementById("prompt-text").textContent = run.prompt;
    const badge = document.getElementById("config-badge");
    const isBaseline = run.id.includes("without_skill") || run.id.includes("old_skill");
    badge.textContent = run.id.includes("with_skill") ? "with skill" : "baseline";
    badge.className = "config-badge " + (isBaseline ? "config-baseline" : "config-primary");
    badge.style.display = "inline-block";
    renderOutputs(run);
    renderPrevOutputs(run);
    renderGrades(run);
    const prevFb = (EMBEDDED_DATA.previous_feedback || {})[run.id];
    const prevEl = document.getElementById("prev-feedback");
    if(prevFb){ document.getElementById("prev-feedback-text").textContent = prevFb; prevEl.style.display="block"; }
    else { prevEl.style.display="none"; }
    document.getElementById("feedback").value = feedbackMap[run.id] || "";
    document.getElementById("feedback-status").textContent = "";
    document.getElementById("prev-btn").disabled = currentIndex===0;
    document.getElementById("next-btn").disabled = currentIndex===EMBEDDED_DATA.runs.length-1;
    visitedRuns.add(index);
    const doneBtn = document.getElementById("done-btn");
    if(visitedRuns.size >= EMBEDDED_DATA.runs.length) doneBtn.classList.add("ready");
    else doneBtn.classList.remove("ready");
    document.querySelector(".main")?.scrollTo?.({top:0,behavior:"smooth"});
  }
  function saveCurrentFeedback(){
    const run = EMBEDDED_DATA.runs[currentIndex];
    const text = document.getElementById("feedback").value;
    if(text.trim()==="") delete feedbackMap[run.id];
    else feedbackMap[run.id] = text;
    const reviews = Object.entries(feedbackMap).map(([rid,fb]) => ({ run_id: rid, feedback: fb, timestamp: new Date().toISOString() }));
    fetch("/api/feedback", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ reviews, status:"in_progress" }) }).catch(()=>{ document.getElementById("feedback-status").textContent = "Will save on submit"; });
    document.getElementById("feedback-status").textContent = "Saved";
  }
  function navigate(delta){ if(currentIndex+delta>=0 && currentIndex+delta<EMBEDDED_DATA.runs.length){ saveCurrentFeedback(); showRun(currentIndex+delta); } }
  function showDoneDialog(){
    const run = EMBEDDED_DATA.runs[currentIndex];
    const text = document.getElementById("feedback").value;
    if(text.trim()==="") delete feedbackMap[run.id]; else feedbackMap[run.id]=text;
    const reviews = EMBEDDED_DATA.runs.map(r => ({ run_id: r.id, feedback: feedbackMap[r.id] || "", timestamp: new Date().toISOString() }));
    const payload = JSON.stringify({ reviews, status:"complete" }, null, 2);
    fetch("/api/feedback", { method:"POST", headers:{"Content-Type":"application/json"}, body: payload }).catch(()=>{ const blob=new Blob([payload],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="feedback.json"; a.click(); URL.revokeObjectURL(blob); });
    document.getElementById("done-overlay").classList.add("visible");
  }
  function closeDoneDialog(){ document.getElementById("done-overlay").classList.remove("visible"); }
  function toggleGrades(){ const c=document.getElementById("grades-content"); const a=document.getElementById("grades-arrow"); c.classList.toggle("open"); a.classList.toggle("open"); }
  function togglePrevOutputs(){ const c=document.getElementById("prev-outputs-content"); const a=document.getElementById("prev-outputs-arrow"); c.classList.toggle("open"); a.classList.toggle("open"); }

  // Benchmark rendering (robust)
  function renderBenchmark(){
    const data = EMBEDDED_DATA.benchmark;
    if(!data || !data.run_summary){ document.getElementById("view-tabs").style.display="none"; return; }
    document.getElementById("view-tabs").style.display = "flex";
    const container = document.getElementById("benchmark-content");
    const summary = data.run_summary;
    const notes = data.notes || [];
    let html = `<h2 style="font-family:Poppins,sans-serif;margin-bottom:0.5rem;">Benchmark Results</h2><p style="color:var(--text-muted);font-size:0.875rem;">${escapeHtml(data.metadata?.skill_name||'')} — ${data.metadata?.timestamp||''}</p>`;
    const configs = Object.keys(summary).filter(k=>k!=="delta");
    const aKey = configs[0] || "with_skill", bKey = configs[1] || "without_skill";
    const a = summary[aKey] || {}, b = summary[bKey] || {}, delta = summary.delta || {};
    html += `<table class="benchmark-table"><thead><tr><th>Metric</th><th>${escapeHtml(aKey.replace(/_/g," "))}</th><th>${escapeHtml(bKey.replace(/_/g," "))}</th><th>Delta</th></tr></thead><tbody>`;
    if(a.pass_rate || b.pass_rate){ html+=`<tr><td><strong>Pass Rate</strong></td><td>${(a.pass_rate?.mean*100||0).toFixed(0)}% ± ${(a.pass_rate?.stddev*100||0).toFixed(0)}%</td><td>${(b.pass_rate?.mean*100||0).toFixed(0)}% ± ${(b.pass_rate?.stddev*100||0).toFixed(0)}%</td><td class="${delta.pass_rate?.startsWith('+')?'benchmark-delta-positive':'benchmark-delta-negative'}">${delta.pass_rate||'—'}</td></tr>`; }
    if(a.time_seconds||b.time_seconds){ html+=`<tr><td><strong>Time (s)</strong></td><td>${(a.time_seconds?.mean||0).toFixed(1)} ± ${(a.time_seconds?.stddev||0).toFixed(1)}</td><td>${(b.time_seconds?.mean||0).toFixed(1)} ± ${(b.time_seconds?.stddev||0).toFixed(1)}</td><td class="${delta.time_seconds?.includes('-')?'benchmark-delta-positive':'benchmark-delta-negative'}">${delta.time_seconds||'—'}</td></tr>`; }
    html+=`</tbody></table>`;
    if(notes.length){ html+=`<div class="benchmark-notes"><h3>Analysis Notes</h3><ul>${notes.map(n=>`<li>${escapeHtml(n)}</li>`).join('')}</ul></div>`; }
    container.innerHTML = html;
  }

  // switchView with robust listeners
  function switchView(viewName){
    document.querySelectorAll(".view-tab").forEach(tab=>tab.classList.remove("active"));
    document.querySelectorAll(".view-panel").forEach(panel=>panel.classList.remove("active"));
    const activeTab = Array.from(document.querySelectorAll(".view-tab")).find(tab=>tab.getAttribute("data-view")===viewName);
    if(activeTab) activeTab.classList.add("active");
    document.getElementById(`panel-${viewName}`)?.classList.add("active");
  }

  document.addEventListener("DOMContentLoaded",()=>{
    document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
    showRun(0);
    renderBenchmark();
    // view tabs listeners
    document.querySelectorAll(".view-tab").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const view = btn.getAttribute("data-view");
        if(view==="outputs") switchView("outputs");
        else if(view==="benchmark") switchView("benchmark");
      });
    });
    // auto-save on input debounce
    const textarea = document.getElementById("feedback");
    let timeout=null;
    textarea.addEventListener("input",()=>{ clearTimeout(timeout); document.getElementById("feedback-status").textContent=""; timeout=setTimeout(()=>saveCurrentFeedback(),600); });
    // keyboard nav
    window.addEventListener("keydown",(e)=>{ if(e.target.tagName==="TEXTAREA") return; if(e.key==="ArrowLeft"||e.key==="ArrowUp"){ e.preventDefault(); navigate(-1); } else if(e.key==="ArrowRight"||e.key==="ArrowDown"){ e.preventDefault(); navigate(1); } });
  });
</script>
</body>
</html>
